{{- $label := "Toggle theme" -}}
{{- if eq .Site.Language.Lang "pt-br" }}{{ $label = "Alternar tema" }}{{ end -}}
<button id="theme-toggle" class="icon-btn" type="button" aria-label="{{ $label }}" aria-pressed="true" title="{{ $label }}">
  {{/* Sun shown in dark mode (click → go light); moon shown in light mode. */}}
  <svg data-icon-sun xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <circle cx="12" cy="12" r="4"></circle>
    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
  </svg>
  <svg data-icon-moon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
  </svg>
</button>
